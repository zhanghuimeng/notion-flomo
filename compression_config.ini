# 图片压缩配置
# 修改后重新运行同步即可生效

[compression]
# 是否启用图片压缩
enabled = true

# 压缩阈值：超过此大小（MB）的图片才会被压缩
# 建议：2-5 MB
threshold_mb = 2

# JPEG 压缩质量（1-100）
# 85 = 高质量，肉眼几乎看不出差别
# 75 = 中等质量，轻微可见压缩痕迹
# 建议：80-90
quality = 85

# 最大图片边长（像素）
# 超过此尺寸的图片会被等比缩小
# 建议：2048-4096
max_dimension = 4096

[audio]
# 是否启用音频压缩
# 注意：音频压缩会影响音质
enabled = false

# 音频压缩阈值（MB）
threshold_mb = 10

# 音频比特率（kbps）
# 128 = 中等质量
# 192 = 高质量
# 256 = 很高质量
bitrate_kbps = 192
