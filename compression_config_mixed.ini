# 图片压缩配置 - 混合场景（截图+照片）
# 修改后重新运行同步即可生效

[compression]
# 是否启用图片压缩
enabled = true

# 压缩阈值：超过此大小（MB）的图片才会被压缩
# 建议：2-5 MB
threshold_mb = 2

# JPEG 压缩质量（1-100）
# 针对混合场景（截图+照片）的优化配置
#
# 质量对照：
# 92 = 很高质量 - 截图文字清晰，照片细节丰富 ✅ 推荐
# 90 = 高质量 - 轻微压缩，适合大多数场景
# 88 = 中高质量 - 平衡质量与大小
# 85 = 中等质量 - 当前配置，压缩略猛
#
# 混合场景推荐：90-92
quality = 90

# 最大图片边长（像素）
# 超过此尺寸的图片会被等比缩小
#
# 尺寸对照：
# 4999 = 几乎不缩小 - 保留所有细节 ✅ 推荐（截图友好）
# 4096 = 适度缩小 - 平衡大小与细节
# 2048 = 明显缩小 - 大幅减小文件
#
# 混合场景推荐：4096-4999
max_dimension = 4096

[audio]
# 是否启用音频压缩
# 注意：音频压缩会影响音质
enabled = false

# 音频压缩阈值（MB）
threshold_mb = 10

# 音频比特率（kbps）
# 128 = 中等质量
# 192 = 高质量
# 256 = 很高质量
bitrate_kbps = 192
